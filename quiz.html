<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1f3a">
  <title>Quiz · PTCE 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">💊 PTCE <span>2026</span></a>
    <a href="index.html" class="back-link">‹ Home</a>
  </header>

  <main class="container">
    <!-- Setup screen -->
    <div id="setupScreen">
      <h1 class="page-title">📝 Quiz Mode</h1>
      <p class="page-sub">Pick a domain and length. Rationale shown after each answer.</p>

      <div class="card-block">
        <h3>Domain</h3>
        <div class="filter-row" id="domainPick"></div>
      </div>
      <div class="card-block">
        <h3>Number of Questions</h3>
        <div class="filter-row" id="countPick"></div>
      </div>
      <div class="card-block">
        <h3>Timer</h3>
        <div class="filter-row" id="timerPick"></div>
      </div>
      <button class="btn gold" id="startBtn" style="width:100%;">Start Quiz</button>
    </div>

    <!-- Quiz screen -->
    <div id="quizScreen" class="hidden">
      <div class="quiz-topbar">
        <span id="qProgress">Question 1</span>
        <span class="timer" id="timer">—</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="question-card" id="questionCard"></div>
      <div class="btn-row" style="justify-content:space-between;">
        <button class="btn outline" id="quitBtn">Quit</button>
        <button class="btn gold hidden" id="nextQBtn">Next ›</button>
      </div>
    </div>

    <!-- Result screen -->
    <div id="resultScreen" class="hidden"></div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
