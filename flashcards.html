<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1f3a">
  <title>Flashcards · PTCE 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">💊 PTCE <span>2026</span></a>
    <a href="index.html" class="back-link">‹ Home</a>
  </header>

  <main class="container">
    <h1 class="page-title">🗂️ Flashcards</h1>
    <p class="page-sub">Tap a card to flip. Filter by domain below.</p>

    <div class="filter-row" id="filterRow"></div>

    <div id="cardArea">
      <div class="flashcard-wrap">
        <div class="flashcard" id="flashcard">
          <div class="face front">
            <span class="domain-tag" id="frontDomain"></span>
            <div class="q-text" id="frontText">Loading…</div>
            <span class="flip-hint">Tap to reveal</span>
          </div>
          <div class="face back">
            <span class="domain-tag" id="backDomain"></span>
            <div class="a-text" id="backText"></div>
            <span class="flip-hint">Tap to flip back</span>
          </div>
        </div>
      </div>
      <p class="card-counter" id="counter"></p>
      <div class="btn-row" style="justify-content:space-between;">
        <button class="btn outline" id="prevBtn">‹ Prev</button>
        <button class="btn gold" id="flipBtn">Flip</button>
        <button class="btn" id="nextBtn">Next ›</button>
      </div>
      <p class="muted center" style="margin-top:14px;">Swipe left/right on the card to navigate.</p>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/flashcards.js"></script>
</body>
</html>
